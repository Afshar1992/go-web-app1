# CICD using GitHub actions

name: CI/CD

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true   # 👈 Add this here

# Exclude the workflow to run on changes to the helm chart
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'helm/**'
      - 'k8s/**'
      - 'README.md'

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Go 1.22
      uses: actions/setup-go@v4
      with:
        go-version: 1.22

    - name: Build
      run: go build -o go-web-app1

    - name: Test
      run: go test ./...
  
  code-quality:                 # ← No indentation (correct)
    runs-on: ubuntu-latest      # ← INDENTED with 2 spaces

    steps:                      # ← INDENTED with 2 spaces
    - name: Checkout repository # ← INDENTED with 2 spaces
      uses: actions/checkout@v4

    - name: Run golangci-lint    # ← INDENTED with 2 spaces
      uses: golangci/golangci-lint-action@v6
      with:
        version: v1.56.2
        #args: --verbose
  
  push:
    runs-on: ubuntu-latest

    needs: build

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push action
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/go-web-app1:${{github.run_id}}

  update-newtag-in-helm-chart:
    runs-on: ubuntu-latest

    needs: push

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.TOKEN }}

    - name: Update tag in Helm chart
      run: |
        sed -i 's/tag: .*/tag: "${{github.run_id}}"/' helm/go-web-app-chart/values.yaml

    - name: Commit and push changes
      run: |
        git config --global user.email "naqibafshar57@gmail.com"
        git config --global user.name "Naqib Afshar"
        git add helm/go-web-app-chart/values.yaml
        git commit -m "Update tag in Helm chart"
        git push